name: Update FIBRA Rankings

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rankings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas yfinance

      - name: Run update script
        run: |
          python datarankings/fibras/update_data.py

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add datarankings/*.csv
          git commit -m "Update FIBRA ranking data" || echo "No changes to commit"
          git push
